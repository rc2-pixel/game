<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夢日記AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=Noto+Sans+JP:wght@300;400&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #0d0d1a;
    min-height: 100vh;
    color: #ddd;
    padding: 20px;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(60,0,100,0.3) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(0,30,80,0.4) 0%, transparent 60%);
  }

  h1 {
    font-family: 'Shippori Mincho', serif;
    text-align: center;
    font-size: 1.8rem;
    background: linear-gradient(135deg, #c8a8f0, #80c0ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }

  .subtitle { text-align: center; color: #888; font-size: 0.82rem; margin-bottom: 20px; }

  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(200,168,240,0.2);
    border-radius: 20px;
    padding: 18px;
    margin-bottom: 14px;
    backdrop-filter: blur(10px);
  }

  .section-title {
    font-size: 0.9rem;
    color: #c8a8f0;
    margin-bottom: 10px;
    font-weight: 600;
  }

  .dream-textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(200,168,240,0.3);
    border-radius: 14px;
    padding: 14px;
    font-family: 'Shippori Mincho', serif;
    font-size: 0.95rem;
    color: #eee;
    resize: none;
    outline: none;
    line-height: 1.8;
    margin-bottom: 10px;
  }
  .dream-textarea:focus { border-color: rgba(200,168,240,0.7); }
  .dream-textarea::placeholder { color: #555; }

  .mood-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .mood-chip {
    background: transparent;
    border: 1px solid rgba(200,168,240,0.4);
    border-radius: 20px;
    padding: 5px 12px;
    color: #aaa;
    font-size: 0.78rem;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .mood-chip.selected { background: rgba(200,168,240,0.2); border-color: #c8a8f0; color: #c8a8f0; }

  .analyze-btn {
    width: 100%;
    background: linear-gradient(135deg, #6040a0, #8060c0);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 14px;
    font-size: 1rem;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.05em;
  }

  .analysis-box {
    background: rgba(128,96,192,0.1);
    border: 1px solid rgba(200,168,240,0.2);
    border-radius: 14px;
    padding: 16px;
    font-size: 0.88rem;
    line-height: 1.8;
    color: #ccc;
    white-space: pre-line;
  }

  .dream-entry {
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 12px 0;
  }
  .dream-entry:last-child { border-bottom: none; }
  .dream-date { font-size: 0.75rem; color: #7080a0; margin-bottom: 4px; }
  .dream-text { font-family: 'Shippori Mincho', serif; font-size: 0.88rem; color: #bbb; line-height: 1.6; }
  .dream-mood-tag { display: inline-block; background: rgba(200,168,240,0.15); border-radius: 10px; padding: 2px 8px; font-size: 0.72rem; color: #c8a8f0; margin-top: 4px; }
  .dream-analysis { font-size: 0.78rem; color: #8898b8; margin-top: 4px; font-style: italic; }

  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: -1;
  }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: white;
    border-radius: 50%;
    opacity: 0.3;
    animation: twinkle 3s infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.1; }
    50% { opacity: 0.6; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<h1>🌙 夢日記AI</h1>
<p class="subtitle">眠れる間の物語を記録しよう</p>

<div class="card">
  <div class="section-title">✍️ 今朝の夢を書く</div>
  <textarea class="dream-textarea" id="dreamText" rows="5" placeholder="夢の内容をできるだけ詳しく書いてください…\n（例：空を飛んでいた、知らない人に追われた、など）"></textarea>
  <div class="section-title">夢の雰囲気</div>
  <div class="mood-row" id="moodRow">
    <button class="mood-chip" onclick="selectMood(this)">😌 平和</button>
    <button class="mood-chip" onclick="selectMood(this)">😨 怖い</button>
    <button class="mood-chip" onclick="selectMood(this)">😄 楽しい</button>
    <button class="mood-chip" onclick="selectMood(this)">😢 悲しい</button>
    <button class="mood-chip" onclick="selectMood(this)">😕 不思議</button>
    <button class="mood-chip" onclick="selectMood(this)">😤 焦り</button>
  </div>
  <button class="analyze-btn" onclick="analyzeDream()">🔮 夢を分析・保存する</button>
</div>

<div class="card" id="analysisCard" style="display:none">
  <div class="section-title">🔮 AI分析結果</div>
  <div class="analysis-box" id="analysisResult"></div>
</div>

<div class="card">
  <div class="section-title">📖 夢の記録</div>
  <div id="dreamList"><p style="color:#555;font-size:0.85rem;text-align:center;padding:10px">まだ記録がありません</p></div>
</div>

<script>
const ANALYSES = {
  '😌 平和': ['平和な夢は、現在の精神的な安定を示しています。', '心が安らかな状態にある証拠です。'],
  '😨 怖い': ['怖い夢は、日中のストレスや不安が表れることがあります。', '何か解決したい問題がある可能性があります。'],
  '😄 楽しい': ['楽しい夢は、ポジティブなエネルギーの表れです。', '創造性や喜びが高まっているサインかもしれません。'],
  '😢 悲しい': ['悲しい夢は感情の整理をしているサインです。', '心が何かを癒そうとしているかもしれません。'],
  '😕 不思議': ['不思議な夢は、潜在意識が新しいアイデアを探索しています。', '創造性が高まっているかもしれません。'],
  '😤 焦り': ['焦りの夢は、締め切りや責任感のプレッシャーを示します。', '少し休息を取ることが大切かもしれません。'],
};

const KEYWORDS = {
  '飛': '「飛ぶ」夢は自由への願望や達成感を表します。',
  '追': '「追われる」夢は逃げたい状況や回避したい問題を暗示します。',
  '水': '「水」は感情や無意識の世界を象徴します。',
  '家': '「家」は自己や心の拠り所を表すことがあります。',
  '海': '「海」は広大な感情や可能性を象徴します。',
  '落': '「落ちる」夢はコントロールを失う不安を示すことがあります。',
};

let selectedMoodText = '';
let dreams = JSON.parse(localStorage.getItem('dreamDiary') || '[]');

function selectMood(btn) {
  document.querySelectorAll('.mood-chip').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedMoodText = btn.textContent;
}

function analyzeDream() {
  const text = document.getElementById('dreamText').value.trim();
  if (!text) { alert('夢の内容を書いてください！'); return; }

  const mood = selectedMoodText || '😕 不思議';
  const moodAnalysis = ANALYSES[mood] || ANALYSES['😕 不思議'];
  let keywordAnalysis = '';
  for (const [key, val] of Object.entries(KEYWORDS)) {
    if (text.includes(key)) { keywordAnalysis += '\n\n' + val; break; }
  }

  const analysis = `【気分】${mood}\n\n${moodAnalysis[Math.floor(Math.random()*moodAnalysis.length)]}${keywordAnalysis}\n\n✨ 夢は心の声。気になるテーマを日記に書き続けることで、自分をより深く理解できます。`;

  document.getElementById('analysisResult').textContent = analysis;
  document.getElementById('analysisCard').style.display = 'block';

  dreams.unshift({
    text,
    mood,
    analysis: moodAnalysis[0],
    date: new Date().toLocaleDateString('ja-JP')
  });
  localStorage.setItem('dreamDiary', JSON.stringify(dreams));

  document.getElementById('dreamText').value = '';
  selectedMoodText = '';
  document.querySelectorAll('.mood-chip').forEach(b => b.classList.remove('selected'));
  renderDreams();
}

function renderDreams() {
  const list = document.getElementById('dreamList');
  if (dreams.length === 0) {
    list.innerHTML = '<p style="color:#555;font-size:0.85rem;text-align:center;padding:10px">まだ記録がありません</p>';
    return;
  }
  list.innerHTML = dreams.slice(0, 5).map(d => `
    <div class="dream-entry">
      <div class="dream-date">${d.date}</div>
      <div class="dream-text">${d.text.length > 80 ? d.text.slice(0,80)+'…' : d.text}</div>
      <span class="dream-mood-tag">${d.mood}</span>
      <div class="dream-analysis">${d.analysis}</div>
    </div>
  `).join('');
}

// 星を生成
const starsEl = document.getElementById('stars');
for (let i = 0; i < 60; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  star.style.left = Math.random()*100 + '%';
  star.style.top = Math.random()*100 + '%';
  star.style.animationDelay = Math.random()*3 + 's';
  starsEl.appendChild(star);
}

renderDreams();
</script>
</body>
</html>
