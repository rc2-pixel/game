<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方言バトル！</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #1a1a2e;
    min-height: 100vh;
    color: #eee;
    padding: 20px;
  }

  h1 {
    font-family: 'Kaisei Decol', serif;
    text-align: center;
    font-size: 2rem;
    background: linear-gradient(135deg, #f7971e, #ffd200);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }

  .subtitle { text-align: center; color: #aaa; font-size: 0.85rem; margin-bottom: 20px; }

  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #16213e;
    border-radius: 14px;
    padding: 12px 20px;
    margin-bottom: 16px;
    font-size: 0.9rem;
  }

  .score { font-size: 1.4rem; font-weight: 700; color: #ffd200; }

  .question-card {
    background: linear-gradient(135deg, #16213e, #0f3460);
    border-radius: 20px;
    padding: 24px 20px;
    margin-bottom: 16px;
    text-align: center;
    border: 1px solid #0f3460;
  }

  .dialect-word {
    font-family: 'Kaisei Decol', serif;
    font-size: 2.5rem;
    color: #ffd200;
    margin-bottom: 8px;
    letter-spacing: 0.1em;
  }

  .region-hint { font-size: 0.8rem; color: #aaa; }

  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .choice-btn {
    background: #16213e;
    border: 2px solid #0f3460;
    border-radius: 14px;
    padding: 16px 10px;
    color: #eee;
    font-size: 0.9rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .choice-btn:hover { border-color: #ffd200; color: #ffd200; }
  .choice-btn.correct { background: #1a472a; border-color: #2ecc71; color: #2ecc71; }
  .choice-btn.wrong { background: #4a1122; border-color: #e74c3c; color: #e74c3c; }
  .choice-btn:disabled { cursor: default; }

  .result-box {
    background: #16213e;
    border-radius: 14px;
    padding: 16px;
    text-align: center;
    margin-bottom: 16px;
    min-height: 60px;
    font-size: 0.95rem;
    line-height: 1.6;
  }

  .next-btn {
    width: 100%;
    background: linear-gradient(135deg, #f7971e, #ffd200);
    border: none;
    border-radius: 14px;
    padding: 14px;
    font-size: 1rem;
    font-family: inherit;
    font-weight: 700;
    color: #1a1a2e;
    cursor: pointer;
    display: none;
  }

  .progress {
    height: 6px;
    background: #16213e;
    border-radius: 10px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #f7971e, #ffd200);
    border-radius: 10px;
    transition: width 0.4s;
  }

  .final-card {
    background: #16213e;
    border-radius: 20px;
    padding: 30px 20px;
    text-align: center;
    display: none;
  }
  .final-score { font-size: 3rem; font-weight: 700; color: #ffd200; margin: 10px 0; }
  .retry-btn {
    margin-top: 16px;
    background: linear-gradient(135deg, #f7971e, #ffd200);
    border: none;
    border-radius: 14px;
    padding: 14px 30px;
    font-size: 1rem;
    font-family: inherit;
    font-weight: 700;
    color: #1a1a2e;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>🗾 方言バトル！</h1>
<p class="subtitle">全国の方言を当てろ！</p>

<div class="score-bar">
  <span>スコア</span>
  <span class="score" id="scoreDisplay">0</span>
  <span id="questionNum">1 / 10</span>
</div>

<div class="progress"><div class="progress-bar" id="progressBar" style="width:10%"></div></div>

<div id="gameArea">
  <div class="question-card">
    <div class="dialect-word" id="dialectWord"></div>
    <div class="region-hint" id="regionHint"></div>
  </div>
  <div class="choices" id="choicesArea"></div>
  <div class="result-box" id="resultBox">👆 意味を選んでください！</div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">次の問題 →</button>
</div>

<div class="final-card" id="finalCard">
  <div style="font-size:1.2rem">ゲーム終了！</div>
  <div class="final-score" id="finalScore"></div>
  <div id="finalMsg"></div>
  <button class="retry-btn" onclick="startGame()">もう一度！</button>
</div>

<script>
const questions = [
  {word:'なんぎ', region:'関西', answer:'つらい・大変', choices:['つらい・大変','うれしい','おいしい','眠い']},
  {word:'ほんなこつ', region:'鹿児島', answer:'本当に', choices:['本当に','少し','たぶん','いつも']},
  {word:'わや', region:'北海道・関西', answer:'めちゃくちゃ', choices:['めちゃくちゃ','きれい','静か','早い']},
  {word:'じゃんね', region:'静岡', answer:'そうだよね', choices:['そうだよね','違うよ','知らない','いいよ']},
  {word:'あめる', region:'愛知', answer:'腐る', choices:['腐る','降る','甘い','集まる']},
  {word:'えらい', region:'関西・中部', answer:'疲れた・しんどい', choices:['疲れた・しんどい','偉い','大きい','強い']},
  {word:'こわい', region:'東北', answer:'疲れた', choices:['疲れた','怖い','硬い','暗い']},
  {word:'ばり', region:'福岡', answer:'とても', choices:['とても','少し','全然','まあまあ']},
  {word:'でれすけ', region:'秋田', answer:'のろまな人', choices:['のろまな人','優しい人','怒った人','元気な人']},
  {word:'おおきに', region:'京都・大阪', answer:'ありがとう', choices:['ありがとう','大きい','ごめん','さようなら']},
];

let current = 0, score = 0, shuffled = [];

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function startGame() {
  current = 0; score = 0;
  shuffled = shuffle(questions);
  document.getElementById('finalCard').style.display = 'none';
  document.getElementById('gameArea').style.display = 'block';
  document.getElementById('scoreDisplay').textContent = 0;
  renderQuestion();
}

function renderQuestion() {
  const q = shuffled[current];
  document.getElementById('dialectWord').textContent = q.word;
  document.getElementById('regionHint').textContent = `📍 ${q.region}の方言`;
  document.getElementById('questionNum').textContent = `${current+1} / 10`;
  document.getElementById('progressBar').style.width = `${(current+1)*10}%`;
  document.getElementById('resultBox').textContent = '👆 意味を選んでください！';
  document.getElementById('nextBtn').style.display = 'none';

  const area = document.getElementById('choicesArea');
  area.innerHTML = shuffle(q.choices).map(c => `
    <button class="choice-btn" onclick="answer(this, '${c}')">${c}</button>
  `).join('');
}

function answer(btn, chosen) {
  const q = shuffled[current];
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  if (chosen === q.answer) {
    btn.classList.add('correct');
    score += 10;
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('resultBox').textContent = `✅ 正解！「${q.word}」は「${q.answer}」という意味です。`;
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.textContent === q.answer) b.classList.add('correct');
    });
    document.getElementById('resultBox').textContent = `❌ 不正解…「${q.word}」は「${q.answer}」でした。`;
  }
  document.getElementById('nextBtn').style.display = 'block';
}

function nextQuestion() {
  current++;
  if (current >= 10) {
    showFinal();
  } else {
    renderQuestion();
  }
}

function showFinal() {
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('finalCard').style.display = 'block';
  document.getElementById('finalScore').textContent = `${score} / 100点`;
  const msgs = ['方言マスター！🏆', 'すごい！方言博士！🎓', 'なかなかやるね！😊', 'もう少し！頑張れ！💪'];
  const idx = score >= 90 ? 0 : score >= 70 ? 1 : score >= 50 ? 2 : 3;
  document.getElementById('finalMsg').textContent = msgs[idx];
}

startGame();
</script>
</body>
</html>
